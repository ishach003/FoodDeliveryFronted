<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Driver Details')"></head>
<body>
<div th:replace="fragments/navbar :: navbar('driver')"></div>

<main>

    <div class="page-header fade-up">
        <div class="page-eyebrow">Driver Module</div>
        <div class="page-title">Driver Details</div>
    </div>

    <!-- 🔍 SEARCH -->
    <div class="search-card fade-up delay-1">
        <form method="post" th:action="@{/driver}" style="display:flex;gap:12px;align-items:flex-end;width:100%;">
            <div class="input-group">
                <label>Driver ID</label>
                <input type="number" name="driverId" placeholder="Enter driver ID…" min="1" required/>
            </div>
            <button type="submit" class="btn btn-primary">🚴 Find Driver</button>
        </form>
    </div>

    <!-- ✅ DRIVER DETAILS -->
    <div th:if="${driver != null}" class="detail-card fade-up delay-2">

        <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;">
            <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,107,53,0.15);border:2px solid rgba(255,107,53,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;">🚴</div>

            <div>
                <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;"
                     th:text="${driver.name}">Driver Name</div>

                <!-- ✅ SAFE STATUS (since backend doesn't send it) -->
                <span class="badge badge-blue">Active</span>
            </div>
        </div>

        <div class="detail-grid">

            <div class="detail-field">
                <label>Driver ID</label>
                <div class="value" th:text="${driver.driverId}">—</div>
            </div>

            <div class="detail-field">
                <label>Full Name</label>
                <div class="value" th:text="${driver.name}">—</div>
            </div>

            <div class="detail-field">
                <label>Phone</label>
                <div class="value"
                     th:text="${driver.phone != null ? driver.phone : 'N/A'}">—</div>
            </div>

            <div class="detail-field">
                <label>Vehicle</label>
                <div class="value">
                    <span class="badge badge-blue"
                          th:text="${driver.vehicleNumber != null ? driver.vehicleNumber : 'N/A'}">—</span>
                </div>
            </div>

            <!-- ❌ REMOVED dynamic status (causing crash earlier) -->
            <div class="detail-field">
                <label>Status</label>
                <div class="value">Active</div>
            </div>

        </div>
    </div>

</main>

<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
