<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Rating Details')"></head>
<body>
<div th:replace="fragments/navbar :: navbar('rating')"></div>

<main>

    <div class="page-header fade-up">
        <div class="page-eyebrow">Ratings Module</div>
        <div class="page-title">Rating Lookup</div>
    </div>

    <!-- 🔍 SEARCH -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;" class="fade-up delay-1">

        <div class="search-card" style="flex-direction:column;gap:16px;">
            <div style="font-weight:700;">⭐ Rating by ID</div>

            <form method="post" th:action="@{/ratings/lookup}" style="display:flex;gap:12px;">
                <div class="input-group">
                    <label>Rating ID</label>
                    <input type="number" name="ratingId" required/>
                </div>
                <button type="submit" class="btn btn-primary">Find</button>
            </form>
        </div>

        <div class="search-card" style="flex-direction:column;gap:16px;">
            <div style="font-weight:700;">🍽️ Ratings by Restaurant</div>

            <form method="post" th:action="@{/ratings/restaurant}" style="display:flex;gap:12px;">
                <div class="input-group">
                    <label>Restaurant ID</label>
                    <input type="number" name="restaurantId" required/>
                </div>
                <button type="submit" class="btn btn-secondary">Browse</button>
            </form>
        </div>

    </div>

    <!-- ✅ SINGLE RATING -->
    <div th:if="${mode == 'single' and rating != null}" class="detail-card fade-up delay-2">

        <div style="margin-bottom:24px;">
            <div style="font-size:18px;font-weight:700;">
                Rating #<span th:text="${rating.ratingId}"></span>
            </div>

            <!-- ⭐ Stars -->
            <div class="stars">
                <span th:each="i : ${#numbers.sequence(1, rating.rating)}">★</span>
                <span th:each="i : ${#numbers.sequence(rating.rating + 1, 5)}" class="empty">★</span>
            </div>
        </div>

        <div class="detail-grid">

            <div class="detail-field">
                <label>Rating ID</label>
                <div class="value" th:text="${rating.ratingId}">—</div>
            </div>

            <div class="detail-field">
                <label>Restaurant ID</label>
                <div class="value" th:text="${rating.restaurantId}">—</div>
            </div>

            <div class="detail-field">
                <label>Order ID</label>
                <div class="value"
                     th:text="${rating.orderId != null ? rating.orderId : 'N/A'}">—</div>
            </div>

            <div class="detail-field">
                <label>Score</label>
                <div class="value"
                     style="color:#ffc107;font-size:22px;font-weight:700;"
                     th:text="${rating.rating} + ' / 5'">—</div>
            </div>

        </div>

        <!-- 💬 COMMENT -->
        <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px;">
            <label>Review</label>
            <div class="value"
                 style="font-style:italic;color:var(--muted);"
                 th:text="${rating.comment != null ? rating.comment : 'No review'}">
            </div>
        </div>

    </div>

</main>

<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
