<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!--
    FRAGMENT: fragments/layout :: sidebar(activePage)
    CHANGE:   Added hidden <meta> tags that carry auth info to app.js
              so sessionStorage is re-hydrated after page refresh.
              Usage: <div th:replace="~{fragments/layout :: sidebar('pageName')}"></div>
-->
<nav th:fragment="sidebar(activePage)"
     class="sidebar" id="sidebar">

    <!--
        Hidden auth meta tags — read by app.js on DOMContentLoaded.
        This fixes the "blank username after refresh" bug because
        sessionStorage is cleared on tab close, but the HttpSession
        is still alive. app.js reads these tags and re-populates
        sessionStorage so the navbar shows the correct user info.
    -->
    <meta name="auth-user"  th:if="${username != null}" th:content="${username}" />
    <meta name="auth-role"  th:if="${role != null}"     th:content="${role}" />
    <meta name="auth-token" th:if="${token != null}"    th:content="${token}" />

    <!-- Logo -->
    <div class="sidebar-logo">
        <div class="logo-icon">🍔</div>
        <div>
            <div class="logo-text">FoodDelivery</div>
            <div class="logo-sub">Admin Panel</div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">

        <div class="nav-section-title">Main</div>

        <a class="nav-item" th:href="@{/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <span class="nav-icon">📊</span>
            Dashboard
        </a>

        <div class="nav-section-title">Data</div>

        <a class="nav-item" th:href="@{/customers}"
           th:classappend="${activePage == 'customers'} ? 'active' : ''">
            <span class="nav-icon">👥</span>
            Customers
        </a>

        <a class="nav-item" th:href="@{/restaurants}"
           th:classappend="${activePage == 'restaurants'} ? 'active' : ''">
            <span class="nav-icon">🍽️</span>
            Restaurants
        </a>

        <a class="nav-item" th:href="@{/orders}"
           th:classappend="${activePage == 'orders'} ? 'active' : ''">
            <span class="nav-icon">📦</span>
            Orders
        </a>

        <a class="nav-item" th:href="@{/drivers}"
           th:classappend="${activePage == 'drivers'} ? 'active' : ''">
            <span class="nav-icon">🚗</span>
            Drivers
        </a>

        <a class="nav-item" th:href="@{/coupons}"
           th:classappend="${activePage == 'coupons'} ? 'active' : ''">
            <span class="nav-icon">🎟️</span>
            Coupons
        </a>

        <a class="nav-item" th:href="@{/ratings}"
           th:classappend="${activePage == 'ratings'} ? 'active' : ''">
            <span class="nav-icon">⭐</span>
            Ratings
        </a>

    </div>

    <!-- User info + logout -->
    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar" id="nav-avatar"
                 th:text="${username != null ? #strings.substring(username,0,1).toUpperCase() : 'U'}">U</div>
            <div class="user-info">
                <div class="user-name"
                     id="nav-username"
                     th:text="${username != null ? username : 'User'}">User</div>
                <div class="user-role"
                     id="nav-role"
                     th:text="${role != null ? #strings.replace(role,'ROLE_','') : ''}">
                </div>
            </div>
        </div>
        <form method="post" th:action="@{/logout}">
            <button type="submit" class="btn-logout">
                <span>⏻</span> Sign Out
            </button>
        </form>
    </div>
</nav>

</html>
