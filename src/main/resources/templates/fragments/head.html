<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — FoodCore'">FoodCore</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --surface2: #1e1e24;
            --border: rgba(255,255,255,0.07);
            --accent: #ff6b35;
            --accent2: #ffa94d;
            --accent-glow: rgba(255,107,53,0.25);
            --text: #f0ede8;
            --muted: #8a8694;
            --green: #2dce89;
            --red: #f5365c;
            --blue: #11cdef;
            --radius: 14px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grain */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(255,107,53,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,169,77,0.08) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============ NAV ============ */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 64px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(13,13,15,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .nav-brand .dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(0.8); }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-links a {
            text-decoration: none;
            padding: 7px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-links a.active {
            color: var(--accent);
            background: rgba(255,107,53,0.1);
            border-color: rgba(255,107,53,0.3);
        }

        /* ============ MAIN ============ */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ============ PAGE HEADER ============ */
        .page-header {
            margin-bottom: 36px;
        }

        .page-eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text) 0%, rgba(240,237,232,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============ SEARCH / INPUT CARD ============ */
        .search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 180px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .input-group input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-group input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        /* Remove number arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #ff7c4a;
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ============ TABLE CARD ============ */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-card-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-card-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
        }

        .count-badge {
            background: rgba(255,107,53,0.12);
            color: var(--accent);
            border: 1px solid rgba(255,107,53,0.25);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 14px 20px;
            background: rgba(255,255,255,0.03);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(255,107,53,0.04);
        }

        /* ============ DETAIL CARD ============ */
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .detail-field label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
        }

        .detail-field .value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        /* ============ BADGES ============ */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green  { background: rgba(45,206,137,0.12); color: var(--green);  border: 1px solid rgba(45,206,137,0.3); }
        .badge-red    { background: rgba(245,54,92,0.12);  color: var(--red);    border: 1px solid rgba(245,54,92,0.3);  }
        .badge-blue   { background: rgba(17,205,239,0.12); color: var(--blue);   border: 1px solid rgba(17,205,239,0.3); }
        .badge-orange { background: rgba(255,107,53,0.12); color: var(--accent); border: 1px solid rgba(255,107,53,0.3); }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ============ STAR RATING ============ */
        .stars {
            display: inline-flex;
            gap: 2px;
        }

        .stars span {
            color: #ffc107;
            font-size: 16px;
        }

        .stars span.empty {
            color: var(--border);
        }

        /* ============ STAT CARDS (home/dashboard) ============ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .stat-card .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 700;
        }

        /* ============ ALERT ============ */
        .alert {
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid;
        }

        .alert-error {
            background: rgba(245,54,92,0.08);
            border-color: rgba(245,54,92,0.3);
            color: var(--red);
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        .fade-up { animation: fadeUp 0.4s ease both; }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 640px) {
            .nav-links { display: none; }
            .search-card { flex-direction: column; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
