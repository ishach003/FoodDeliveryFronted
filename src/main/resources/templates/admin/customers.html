<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Customers')"></head>
<body>

<div th:replace="fragments/navbar :: navbar('admin')"></div>

<main>

    <!-- HEADER -->
    <div class="page-header fade-up">
        <div class="page-eyebrow">Administration</div>
        <div class="page-title">Customers</div>
    </div>

    <!-- SEARCH CARD -->
    <div class="search-card fade-up delay-1">
        <form method="get" th:action="@{/admin/customers}" style="display:flex;gap:12px;align-items:flex-end;width:100%;">
            <div class="input-group">
                <label>Customer ID</label>
                <input type="number" name="customerId" placeholder="Enter customer ID…"
                       th:value="${customerId}" min="1" required/>
            </div>
            <button type="submit" class="btn btn-primary">👥 Lookup Customer</button>
        </form>
    </div>

    <!-- ADDRESSES RESULT -->
    <div th:if="${addresses != null}">
        <div class="table-card fade-up delay-2">
            <div class="table-card-header">
                <span class="table-card-title">Addresses for Customer #<span th:text="${customerId}"></span></span>
                <span class="count-badge" th:text="${addresses.size()} + ' address(es)'"></span>
            </div>
            <div th:if="${addresses.isEmpty()}" class="empty-state">
                <span class="icon">📭</span><p>No addresses found for this customer.</p>
            </div>
            <table th:unless="${addresses.isEmpty()}">
                <thead>
                <tr>
                    <th>Address ID</th>
                    <th>Street</th>
                    <th>Address Line 2</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Postal Code</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="addr : ${addresses}">
                    <td style="font-family:'Syne',sans-serif;font-weight:700;" th:text="'#' + ${addr.addressId}"></td>
                    <td th:text="${addr.street}"></td>
                    <td th:text="${addr.addressLine2 != null ? addr.addressLine2 : '—'}"></td>
                    <td th:text="${addr.city}"></td>
                    <td th:text="${addr.state}"></td>
                    <td th:text="${addr.zipCode}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ORDERS RESULT -->
    <div th:if="${orders != null}">
        <div class="table-card fade-up delay-3">
            <div class="table-card-header">
                <span class="table-card-title">Orders for Customer #<span th:text="${customerId}"></span></span>
                <span class="count-badge" th:text="${orders.size()} + ' order(s)'"></span>
            </div>
            <div th:if="${orders.isEmpty()}" class="empty-state">
                <span class="icon">📭</span><p>No orders found for this customer.</p>
            </div>
            <table th:unless="${orders.isEmpty()}">
                <thead>
                <tr><th>Order ID</th><th>Restaurant</th><th>Status</th><th>Total</th><th>Time</th></tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td style="font-family:'Syne',sans-serif;font-weight:700;" th:text="'#' + ${o.orderId}"></td>
                    <td th:text="${o.restaurantId}"></td>
                    <td>
                        <span th:if="${o.status == 'DELIVERED'}"  class="badge badge-green"  th:text="${o.status}"></span>
                        <span th:if="${o.status == 'CANCELLED'}"  class="badge badge-red"    th:text="${o.status}"></span>
                        <span th:if="${o.status == 'PENDING'}"    class="badge badge-orange" th:text="${o.status}"></span>
                        <span th:unless="${o.status == 'DELIVERED' or o.status == 'CANCELLED' or o.status == 'PENDING'}"
                              class="badge badge-blue" th:text="${o.status}"></span>
                    </td>
                    <td style="color:var(--accent);font-weight:600;">₹<span th:text="${o.totalAmount}"></span></td>
                    <td style="color:var(--muted);font-size:13px;" th:text="${o.orderTime}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
